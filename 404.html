<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yönlendiriliyorsunuz...</title>
    <style>
        /* Modern ve Minimalist CSS Tasarımı */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            padding: 40px 20px;
            border-radius: 12px;
            background: #242424;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
            display: none; /* Varsayılan olarak gizli, sadece 404 durumunda görünecek */
        }
        h1 {
            font-size: 4rem;
            color: #ff4757;
            margin-bottom: 10px;
            font-weight: 800;
        }
        h2 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            color: #e0e0e0;
        }
        p {
            color: #a0a0a0;
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #535bf2;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover {
            background-color: #4047d5;
            transform: translateY(-2px);
        }
        .btn:active {
            transform: translateY(0);
        }
    </style>
<link rel="stylesheet" href="gerisayim.css">	
    <script type="text/javascript">
        // Gelen URL'yi alıyoruz ve küçük harfe çeviriyoruz
        const path = window.location.pathname.toLowerCase();

        // Yönlendirme listemiz
        const linkler = {
            "/wa": "https://api.whatsapp.com/send/?phone=905056449985",
        };

        // Eğer yazılan URL listemizde varsa yönlendir
        if (linkler[path]) {
            if (path === "/wa") {
                // 'xxxx' değerini kendi gizli anahtarınızla değiştirebilirsiniz
                const anahtarKelime = "0078"; 

                // Modern tarayıcılarda panoya otomatik kopyalama tetikleniyor
                navigator.clipboard.writeText(anahtarKelime).then(function() {
                    alert(
                        "🔐 SOHBET ANAHTARI KOPYALANDI!\n\n" +
                        "Spam koruması için gereken '" + anahtarKelime + "' anahtarı panonuza (hafızaya) otomatik kopyalandı.\n\n" +
                        "WhatsApp sohbeti açıldığında mesaj alanına doğrudan yapıştırıp (Ctrl+V) bana gönderebilirsiniz.\n\n" +
                        "Tamam'a bastığınızda yönlendirileceksiniz."
                    );
                    window.location.href = linkler[path];
                }).catch(function() {
                    // Tarayıcı güvenlik/izin engeline takılırsa manuel kopyalama mesajı gösterilir
                    alert(
                        "⚠️ SOHBET ANAHTARI DOĞRULAMASI\n\n" +
                        "Spam koruması için sohbet anahtarınız:\n" +
                        "👉 Anahtar: " + anahtarKelime + "\n\n" +
                        "Lütfen bu anahtarı not edin ve WhatsApp sohbet ekranında bana iletin."
                    );
                    window.location.href = linkler[path];
                });
            } else {
                // Diğer tüm normal linkler beklemeden yönlenir
                window.location.href = linkler[path];
            }
        } else {
            // Eğer listede olmayan rastgele bir şey yazıldıysa gerçek bir 404 sayfasına yönlendir veya mesaj yaz
            document.write("<br><h2>Aradığınız içerik mevcut değil. <br><a href='/'>Ana Sayfaya Dön</a></h2>");
        }
    </script>
</head>
<body>

    <div class="container" id="error-box">
        <div class="logo-wrapper">
            <img src="img/logo.png" class="spinning-logo" alt="Ferdimen & Aykırı Yollar">
        </div>	
        <h1>404</h1>
        <h2>Sayfa Bulunamadı</h2>
        <p>Aradığınız rota geçerli bir yönlendirme adresi değil veya bu sayfa artık mevcut değil.</p>
        <a href="https://ganosbisiklet.com" class="btn">Ana Sayfaya Dön</a>
    </div>

</body>
</html>
